<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>График нарядов — 9 группа</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f1419 0%,#1a1f2e 100%);color:#e1e8f0;font-family:Inter,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.header{background:linear-gradient(135deg,rgba(15,20,25,.95),rgba(26,31,46,.95));border-bottom:1px solid rgba(61,122,82,.2);padding:36px 22px;position:sticky;top:0;z-index:20;backdrop-filter:blur(10px)}
.header-inner{max-width:1500px;margin:0 auto}
.header-subtitle{font:13px "JetBrains Mono",monospace;color:#3d7a52;text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.header-title{font:700 31px Merriweather,serif;color:#fff;letter-spacing:-.4px}
.container{max-width:1500px;margin:0 auto;padding:26px 18px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;border-bottom:2px solid rgba(61,122,82,.1);padding-bottom:12px;overflow-x:auto}
.tab{background:transparent;border:none;padding:10px 14px;border-radius:4px;color:#7a8aaa;font:600 13px Inter,sans-serif;cursor:pointer;white-space:nowrap}
.tab:hover,.tab.active{color:#3d7a52;background:rgba(61,122,82,.12)}
.notice{margin:12px 0 18px;padding:12px 14px;border:1px solid rgba(212,148,74,.35);border-radius:8px;background:rgba(212,148,74,.08);color:#d8b17a;font-family:"JetBrains Mono",monospace;font-size:12px}
.table-container{background:rgba(26,31,46,.55);border:1px solid rgba(61,122,82,.15);border-radius:8px;overflow:auto;max-height:74vh}
table{border-collapse:collapse;width:max-content;min-width:100%;font-size:13px}
th,td{border:1px solid rgba(61,122,82,.16);padding:8px 8px;text-align:center;vertical-align:middle;min-width:62px}
thead th{position:sticky;top:0;background:#152432;color:#3d7a52;z-index:5;text-transform:uppercase;letter-spacing:.04em;font-size:11px}
th.col-num,td.col-num{position:sticky;left:0;background:#151b29;z-index:6;min-width:42px;width:42px;color:#5a6480;font-family:"JetBrains Mono",monospace}
th.col-fio,td.col-fio{position:sticky;left:42px;background:#151b29;z-index:6;min-width:205px;width:205px;text-align:left;font-weight:600;color:#e1e8f0}
thead th.col-num,thead th.col-fio{background:#152432;z-index:8;color:#3d7a52}
td.duty{font-family:"JetBrains Mono",monospace;font-size:11px;color:#e1e8f0;white-space:nowrap}
td.weekend,th.weekend{background:rgba(212,148,74,.10)}
td.empty{color:#3a4560}
th.total,td.total{min-width:92px;background:rgba(212,148,74,.11);font-family:"JetBrains Mono",monospace;font-weight:700;color:#d4944a}
th.month-count,td.month-count{min-width:92px;background:rgba(61,122,82,.13);font-family:"JetBrains Mono",monospace;font-weight:700;color:#7ac44a}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font:700 10px "JetBrains Mono",monospace}
.b-kpp1{background:rgba(74,175,212,.15);color:#4aafd4}.b-kpp2{background:rgba(122,196,74,.15);color:#7ac44a}.b-rota{background:rgba(212,148,74,.15);color:#d4944a}.b-kurs{background:rgba(196,74,179,.15);color:#c44ab3}.b-pvn{background:rgba(122,122,212,.15);color:#7a7ad4}.b-atd{background:rgba(212,212,74,.15);color:#d4d44a}.b-other{background:rgba(138,149,176,.15);color:#8a95b0}
.footer{padding:16px 0;text-align:right;font:11px "JetBrains Mono",monospace;color:#5a6480}
.panel{display:none}.panel.active{display:block}
.loading{padding:40px;text-align:center;color:#7a8aaa;font-family:"JetBrains Mono",monospace}
@media(max-width:768px){.header{padding:28px 18px}.header-title{font-size:27px}.container{padding:18px 10px}th,td{padding:7px 6px;min-width:54px}.col-fio{min-width:172px!important;width:172px!important}.footer{text-align:center}}
</style>
</head>
<body>
<div class="header"><div class="header-inner"><div class="header-subtitle">Воинская часть · 9 группа</div><h1 class="header-title">График нарядов</h1></div></div>
<div class="container">
  <div class="tabs" id="tabs"></div>
  <div id="notice" class="notice">Загрузка данных из Google Таблицы...</div>
  <div id="panels"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
// ВАЖНО: сюда нужно вставить ID новой Google Таблицы в широком формате.
// ID берётся из ссылки: https://docs.google.com/spreadsheets/d/ВОТ_ЭТО_ID/edit
const SPREADSHEET_ID = "1AZ4CA3UGa1FVZD64Dku8WfwJkm8e4GjfFvVZsJLR6hM";

const MONTHS = [{"sheet": "Октябрь 2025", "name": "Октябрь", "year": 2025, "num": 10, "days": 31}, {"sheet": "Ноябрь 2025", "name": "Ноябрь", "year": 2025, "num": 11, "days": 30}, {"sheet": "Декабрь 2025", "name": "Декабрь", "year": 2025, "num": 12, "days": 31}, {"sheet": "Январь 2026", "name": "Январь", "year": 2026, "num": 1, "days": 31}, {"sheet": "Февраль 2026", "name": "Февраль", "year": 2026, "num": 2, "days": 28}, {"sheet": "Июнь 2026", "name": "Июнь", "year": 2026, "num": 6, "days": 30}, {"sheet": "Июль 2026", "name": "Июль", "year": 2026, "num": 7, "days": 31}, {"sheet": "Август 2026", "name": "Август", "year": 2026, "num": 8, "days": 31}, {"sheet": "Сентябрь 2026", "name": "Сентябрь", "year": 2026, "num": 9, "days": 30}];
const ROSTER = ["Беднов К.В.", "Бутов Н.Е.", "Вихляев М.А.", "Войцеховский А.А.", "Вяткин Д.С.", "Гарин Н.С.", "Дуденко Н.А.", "Жибров М.С.", "Загуляев И.А.", "Золотых-Иоанниди В.К.", "Карпин Н.Е.", "Киселев В.С.", "Луговской Д.В.", "Несмелов Д.О.", "Никулин А.А.", "Порошин В.К.", "Радченко В.А.", "Сорокин С.В.", "Телька Н.В.", "Тягульский М.А.", "Шелков Д.М."];

function badgeClass(type){
  const t=String(type||'').toLowerCase().replace(/\s/g,'');
  if(t.includes('кпп1') || t==='кпп') return 'b-kpp1';
  if(t.includes('кпп2')) return 'b-kpp2';
  if(t.includes('рота') || t.includes('деж')) return 'b-rota';
  if(t.includes('курс')) return 'b-kurs';
  if(t.includes('пвн')) return 'b-pvn';
  if(t.includes('атд')) return 'b-atd';
  return 'b-other';
}
function parseCell(cell){ if(!cell) return ''; return cell.f ?? cell.v ?? ''; }
function norm(s){ return String(s||'').toLowerCase().replaceAll('ё','е').replace(/[.\s-]/g,'').trim(); }
function jsonp(sheetName){
  return new Promise((resolve,reject)=>{
    const cb='gs_cb_'+Math.random().toString(36).slice(2);
    window[cb]=(res)=>{ delete window[cb]; script.remove(); resolve(res); };
    const script=document.createElement('script');
    script.onerror=()=>{ delete window[cb]; script.remove(); reject(new Error('Не удалось загрузить лист '+sheetName)); };
    script.src=`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json;responseHandler:${cb}&cache=${Date.now()}`;
    document.head.appendChild(script);
    setTimeout(()=>{ if(window[cb]){ delete window[cb]; script.remove(); reject(new Error('Таблица не ответила: '+sheetName)); } }, 12000);
  });
}
function countDuties(entries){
  return Object.values(entries||{}).filter(v=>String(v||'').trim()).length;
}
function buildMonthTable(month, rows, totals){
  const days=Array.from({length:month.days},(_,i)=>i+1);
  let html='<div class="table-container"><table><thead><tr>';
  html+='<th class="col-num">№</th><th class="col-fio">ФИО</th>';
  for(const d of days){
    const dateObj=new Date(month.year, month.num-1, d);
    const weekend=dateObj.getDay()===0 || dateObj.getDay()===6;
    const wd=['вс','пн','вт','ср','чт','пт','сб'][dateObj.getDay()];
    html+=`<th class="${weekend?'weekend':''}">${String(d).padStart(2,'0')}<br><span style="font-size:10px;color:#6b7894">${wd}</span></th>`;
  }
  html+='<th class="month-count">За месяц</th><th class="total">Всего</th></tr></thead><tbody>';
  const order=ROSTER.slice();
  order.forEach((fio,idx)=>{
    const r=rows[norm(fio)] || {fio,entries:{}};
    const monthCount=countDuties(r.entries);
    const total=totals[norm(fio)] || 0;
    html+=`<tr><td class="col-num">${String(idx+1).padStart(2,'0')}</td><td class="col-fio">${fio}</td>`;
    for(const d of days){
      const val=(r.entries && r.entries[d]) ? String(r.entries[d]).trim() : '';
      const dateObj=new Date(month.year, month.num-1, d);
      const weekend=dateObj.getDay()===0 || dateObj.getDay()===6;
      html+=`<td class="duty ${weekend?'weekend':''} ${val?'':'empty'}">${val?`<span class="badge ${badgeClass(val)}">${val}</span>`:'—'}</td>`;
    }
    html+=`<td class="month-count">${monthCount||'—'}</td><td class="total">${total||'—'}</td></tr>`;
  });
  html+='</tbody></table></div>';
  return html;
}
function buildSummary(totals){
  const sorted=ROSTER.slice().sort((a,b)=>(totals[norm(b)]||0)-(totals[norm(a)]||0)||a.localeCompare(b));
  let html='<div class="table-container"><table><thead><tr><th class="col-num">№</th><th class="col-fio">ФИО</th><th class="total">Всего</th></tr></thead><tbody>';
  sorted.forEach((fio,i)=>{ html+=`<tr><td class="col-num">${String(i+1).padStart(2,'0')}</td><td class="col-fio">${fio}</td><td class="total">${totals[norm(fio)]||'—'}</td></tr>`; });
  html+='</tbody></table></div>';
  return html;
}
async function loadAll(){
  if(!SPREADSHEET_ID || SPREADSHEET_ID.includes('PASTE_')){
    document.getElementById('notice').textContent='Нужно вставить ID новой Google Таблицы в index.html.';
    return;
  }
  const all={};
  const totals={};
  ROSTER.forEach(f=>totals[norm(f)]=0);
  for(const m of MONTHS){
    const res=await jsonp(m.sheet);
    if(!res || !res.table || !res.table.rows) throw new Error('Пустой ответ от листа '+m.sheet);
    const rows=res.table.rows.map(r=>(r.c||[]).map(parseCell));
    // Автоопределяем структуру листа.
    // Это важно: в Google Sheets после сохранения/редактирования строки и столбцы могут немного сместиться,
    // поэтому нельзя жёстко считать, что ФИО всегда в B, а день 1 всегда в C.
    const headerIndex = rows.findIndex(row => (row||[]).some(v => norm(v) === 'фио'));
    if(headerIndex < 0) throw new Error('Не найдена строка заголовков с ФИО на листе '+m.sheet);
    const header = rows[headerIndex] || [];
    const fioCol = header.findIndex(v => norm(v) === 'фио');
    const dateCols = [];
    for(let c=0; c<header.length; c++){
      const raw = String(header[c] ?? '').trim();
      // Берём число из ячейки заголовка даты: подходит «1», «01», «1\nвс», «1 вс».
      const match = raw.match(/^(\d{1,2})(?:\D|$)/);
      if(match){
        const day = Number(match[1]);
        if(day >= 1 && day <= m.days) dateCols.push({day, col:c});
      }
    }
    if(fioCol < 0 || dateCols.length === 0) throw new Error('Не найдены ФИО или даты на листе '+m.sheet);

    const map={};
    for(let i=headerIndex+1;i<rows.length;i++){
      const row=rows[i]||[];
      const fio=String(row[fioCol]||'').trim();
      if(!fio || norm(fio)==='фио' || norm(fio)==='итого') continue;
      const entries={};
      for(const dc of dateCols){
        const val=String(row[dc.col]||'').trim();
        if(val) entries[dc.day]=val;
      }
      map[norm(fio)]={fio,entries};
      totals[norm(fio)]=(totals[norm(fio)]||0)+countDuties(entries);
    }
    all[m.sheet]=map;
  }
  render(all,totals);
  document.getElementById('notice').textContent='Источник: Google Таблица · данные считаются по заполненным ячейкам под датами · автоопределение ФИО/дат.';
}
function render(all,totals){
  const tabs=document.getElementById('tabs');
  const panels=document.getElementById('panels');
  tabs.innerHTML=''; panels.innerHTML='';
  let activeId='summary';
  const makeTab=(id,label)=>{
    const b=document.createElement('button'); b.className='tab'+(id===activeId?' active':''); b.textContent=label;
    b.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.getElementById('panel-'+id).classList.add('active'); updateFooter(id,all,totals); };
    tabs.appendChild(b);
  };
  const addPanel=(id,html)=>{
    const p=document.createElement('div'); p.id='panel-'+id; p.className='panel'+(id===activeId?' active':''); p.innerHTML=html; panels.appendChild(p);
  };
  makeTab('summary','📊 Итого');
  addPanel('summary',buildSummary(totals));
  MONTHS.forEach((m,i)=>{ makeTab(String(i),m.sheet); addPanel(String(i),buildMonthTable(m, all[m.sheet]||{}, totals)); });
  updateFooter('summary',all,totals);
}
function updateFooter(id,all,totals){
  const total=Object.values(totals).reduce((a,b)=>a+b,0);
  document.getElementById('footer').textContent=`Личный состав: ${ROSTER.length} · Всего нарядов: ${total}`;
}
loadAll().catch(e=>{
  console.error(e);
  document.getElementById('notice').textContent='Ошибка загрузки Google Таблицы: '+e.message+' · проверьте доступ «Все, у кого есть ссылка — просмотр» и правильный ID.';
});
</script>
</body>
</html>
