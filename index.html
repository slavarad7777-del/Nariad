<html lang="ru">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>График нарядов — 9 группа</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }
body {
  background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
  color: #e1e8f0;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, rgba(15, 20, 25, 0.95) 0%, rgba(26, 31, 46, 0.95) 100%);
  border-bottom: 1px solid rgba(61, 122, 82, 0.2);
  padding: 40px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.header-inner {
  max-width: 1300px;
  margin: 0 auto;
}
.header-title {
  font-family: 'Merriweather', serif;
  font-size: 32px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.header-subtitle {
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  color: #3d7a52;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 32px 24px;
}

.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  border-bottom: 2px solid rgba(61, 122, 82, 0.1);
  padding-bottom: 16px;
  overflow-x: auto;
}
.tab {
  position: relative;
  background: none;
  border: none;
  padding: 10px 16px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  color: #7a8aaa;
  cursor: pointer;
  transition: color 0.3s, background 0.3s;
  border-radius: 4px;
  white-space: nowrap;
}
.tab:hover {
  color: #3d7a52;
  background: rgba(61, 122, 82, 0.08);
}
.tab.active {
  color: #3d7a52;
  background: rgba(61, 122, 82, 0.12);
  font-weight: 600;
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #3d7a52, #5a9a6a);
}

.legend {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
  padding: 20px;
  background: rgba(61, 122, 82, 0.05);
  border-radius: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  color: #a0aab8;
}
.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

.table-container {
  background: rgba(26, 31, 46, 0.5);
  border-radius: 8px;
  border: 1px solid rgba(61, 122, 82, 0.15);
  overflow: hidden;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead {
  background: linear-gradient(135deg, rgba(61, 122, 82, 0.15) 0%, rgba(61, 122, 82, 0.08) 100%);
  border-bottom: 1px solid rgba(61, 122, 82, 0.2);
}
th {
  padding: 16px;
  text-align: left;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 12px;
  color: #3d7a52;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
th:first-child { width: 40px; text-align: center; }
th:last-child, th:nth-last-child(2), th:nth-last-child(3) { text-align: center; }

tbody tr {
  border-bottom: 1px solid rgba(61, 122, 82, 0.08);
  transition: background 0.2s;
}
tbody tr:hover {
  background: rgba(61, 122, 82, 0.08);
}
tbody tr:last-child { border-bottom: none; }

td {
  padding: 14px 16px;
  vertical-align: middle;
}
td:first-child {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #5a6480;
  text-align: center;
  font-weight: 500;
}
.td-fio {
  color: #e1e8f0;
  font-weight: 500;
}
.td-dates {
  color: #8a95aa;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.8;
}
.td-count {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 14px;
}
.td-total {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #7a8aaa;
}

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  margin: 2px 3px 2px 0;
  white-space: nowrap;
}
.b-kpp1 { background: rgba(74, 175, 212, 0.15); color: #4aafd4; }
.b-kpp2 { background: rgba(122, 196, 74, 0.15); color: #7ac44a; }
.b-rota { background: rgba(212, 148, 74, 0.15); color: #d4944a; }
.b-kurs { background: rgba(196, 74, 179, 0.15); color: #c44ab3; }
.b-pvn { background: rgba(122, 122, 212, 0.15); color: #7a7ad4; }
.b-atd { background: rgba(212, 212, 74, 0.15); color: #d4d44a; }
.b-other { background: rgba(138, 149, 176, 0.15); color: #8a95b0; }

.count-0 { color: #3a4560; }
.count-1to2 { color: #5a8060; }
.count-3to4 { color: #7ac44a; }
.count-5plus { color: #d4944a; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #3a4560;
}
.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state-text {
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

.footer {
  padding: 20px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #3a4560;
  text-align: right;
}

.month-panel {
  display: none;
}
.month-panel.active {
  display: block;
  animation: fadeIn 0.3s ease-in;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@media (max-width: 768px) {
  .header-title { font-size: 24px; }
  .container { padding: 16px 12px; }
  .tabs { gap: 4px; }
  .tab { padding: 8px 12px; font-size: 13px; }
  .legend { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
  td, th { padding: 10px 8px; font-size: 12px; }
}
</style>
</head>

function normalizeText(value) {
  return String(value ?? '').trim();
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];
    if (ch === '"') {
      if (inQuotes && next === '"') { cell += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      row.push(cell); cell = '';
    } else if ((ch === '\n' || ch === '\n') && !inQuotes) {
      if (ch === '\n' && next === '\n') i++;
      row.push(cell);
      if (row.some(v => normalizeText(v) !== '')) rows.push(row);
      row = []; cell = '';
    } else {
      cell += ch;
    }
  }
  row.push(cell);
  if (row.some(v => normalizeText(v) !== '')) rows.push(row);
  if (!rows.length) return [];
  const headers = rows[0].map(h => normalizeText(h).toLowerCase());
  return rows.slice(1).map(values => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = normalizeText(values[i]));
    return obj;
  });
}

function buildDataFromRows(rows) {
  const rosterSet = new Set();
  const totals = {};
  const monthsMap = new Map();
  const data = {};

  rows.forEach(r => {
    const fio = normalizeText(r.fio || r['фио']);
    const year = Number(r.year || r['год']);
    const month = normalizeText(r.month || r['месяц']);
    const monthNum = Number(r.month_num || r.monthnum || r['номер_месяца'] || r['номер месяца']);
    const day = Number(r.day || r['день']);
    const type = normalizeText(r.type || r['тип'] || r['наряд']);
    const totalRaw = normalizeText(r.total || r['всего']);
    if (!fio || !year || !month || !monthNum) return;

    rosterSet.add(fio);
    const monthKey = `${month}_${year}`;
    if (!monthsMap.has(monthKey)) monthsMap.set(monthKey, { name: month, year, num: monthNum });
    if (!data[monthKey]) data[monthKey] = {};
    if (!data[monthKey][fio]) data[monthKey][fio] = { fio, entries: [], month_total: 0 };
    if (day && type) data[monthKey][fio].entries.push({ day, type });
    if (totalRaw !== '' && !Number.isNaN(Number(totalRaw))) totals[fio] = Number(totalRaw);
  });

  const months = Array.from(monthsMap.values()).sort((a,b) => (a.year - b.year) || (a.num - b.num));
  const roster = Array.from(rosterSet).sort((a,b) => a.localeCompare(b, 'ru'));
  const finalData = {};
  months.forEach(m => {
    const key = `${m.name}_${m.year}`;
    finalData[key] = roster.map(fio => {
      const row = data[key]?.[fio] || { fio, entries: [] };
      row.entries.sort((a,b) => a.day - b.day || a.type.localeCompare(b.type, 'ru'));
      return { fio, entries: row.entries, month_total: row.entries.length };
    });
  });

  roster.forEach(fio => {
    if (!(fio in totals)) {
      totals[fio] = months.reduce((sum, m) => {
        const key = `${m.name}_${m.year}`;
        const p = finalData[key]?.find(x => x.fio === fio);
        return sum + (p?.month_total || 0);
      }, 0);
    }
  });

  return { roster, months, data: finalData, totals };
}

function loadGoogleSheetRowsJsonp() {
  return new Promise((resolve, reject) => {
    if (!GOOGLE_SHEET_ID) return reject(new Error('нет ID таблицы'));

    const callbackName = '__naradSheetCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');
    let timeoutId;

    function cleanup() {
      clearTimeout(timeoutId);
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('Google Sheets не ответил. Проверьте доступ: Все, у кого есть ссылка → Просмотр'));
    }, 15000);

    window[callbackName] = (json) => {
      cleanup();
      try {
        const table = json && json.table;
        if (!table || !table.cols || !table.rows) throw new Error('неверный ответ Google');

        const headers = table.cols.map(c => normalizeText(c.label || c.id).toLowerCase());
        const rows = table.rows.map(r => {
          const obj = {};
          headers.forEach((h, i) => {
            const cell = r.c && r.c[i];
            obj[h] = normalizeText(cell ? (cell.f ?? cell.v ?? '') : '');
          });
          return obj;
        }).filter(r => Object.values(r).some(v => normalizeText(v) !== ''));

        resolve(rows);
      } catch (err) {
        reject(err);
      }
    };

    const tqx = 'out:json;responseHandler:' + callbackName;
    // Берём лист по имени Data. Так надёжнее, чем gid=0 после сохранения из Excel.
    const url = 'https://docs.google.com/spreadsheets/d/' + encodeURIComponent(GOOGLE_SHEET_ID) +
      '/gviz/tq?tqx=' + encodeURIComponent(tqx) +
      '&headers=1&sheet=' + encodeURIComponent(GOOGLE_SHEET_NAME || 'Data') +
      '&tq=' + encodeURIComponent('select *') +
      '&cache=' + Date.now();

    script.onerror = () => {
      cleanup();
      reject(new Error('не удалось загрузить Google Sheets. Проверьте доступ к таблице'));
    };
    script.src = url;
    document.head.appendChild(script);
  });
}

async function loadGoogleSheetData() {
  if (!GOOGLE_SHEET_ID && !GOOGLE_SHEET_CSV_URL) return;
  try {
    let rows = [];

    if (GOOGLE_SHEET_ID) {
      rows = await loadGoogleSheetRowsJsonp();
      DATA_SOURCE_LABEL = 'Google Sheets';
    } else {
      const url = GOOGLE_SHEET_CSV_URL + (GOOGLE_SHEET_CSV_URL.includes('?') ? '&' : '?') + 'cache=' + Date.now();
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const text = await response.text();
      rows = parseCsv(text);
      DATA_SOURCE_LABEL = 'Google Sheets CSV';
    }

    const parsed = buildDataFromRows(rows);
    if (!parsed.roster.length) throw new Error('таблица пустая или неверные заголовки');
    ROSTER = parsed.roster;
    DATA = parsed.data;
    TOTALS = parsed.totals;
    MONTHS.splice(0, MONTHS.length, ...parsed.months);
  } catch (err) {
    DATA_SOURCE_LABEL = 'ОШИБКА Google Sheets: ' + err.message;
    console.error('Не удалось загрузить Google Sheets:', err);
  }
}

function badgeClass(type) {
  const t = type.toLowerCase().replace(/\s/g, '');
  if (t.includes('кпп1') || t === 'кпп') return 'b-kpp1';
  if (t.includes('кпп2')) return 'b-kpp2';
  if (t.includes('рота') || t.includes('деж')) return 'b-rota';
  if (t.includes('курс')) return 'b-kurs';
  if (t.includes('пвн')) return 'b-pvn';
  if (t.includes('атд')) return 'b-atd';
  return 'b-other';
}

function countClass(n) {
  if (n === 0) return 'count-0';
  if (n <= 2) return 'count-1to2';
  if (n <= 4) return 'count-3to4';
  return 'count-5plus';
}

function isWeekend(year, num, day) {
  const d = new Date(year, num - 1, day);
  return d.getDay() === 0 || d.getDay() === 6;
}

function formatDate(year, num, day) {
  const d = new Date(year, num - 1, day);
  const dd = String(day).padStart(2, '0');
  const mm = String(num).padStart(2, '0');
  const days = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
  const wd = days[d.getDay()];
  const we = isWeekend(year, num, day);
  return `<span style="color: ${we ? '#d4944a' : '#8a95aa'}">${dd}.${mm}</span> <span style="font-size: 10px; color: ${we ? '#8a5a2a' : '#5a6480'}">${wd}</span>`;
}

function buildMonthPanel(month) {
  const key = month.name + '_' + month.year;
  const rows = DATA[key] || [];
  const hasData = rows.some(r => r.entries.length > 0);
  let html = `<div class="table-container"><table><thead><tr><th>#</th><th>ФИО</th><th>Даты заступления</th><th>За месяц</th><th>Всего</th></tr></thead><tbody>`;
  if (!hasData) {
    html += `<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Данные за ${month.name.toLowerCase()} ${month.year} не внесены</div></div></td></tr>`;
  } else {
    const sorted = [...rows].sort((a, b) => b.month_total - a.month_total || a.fio.localeCompare(b.fio, 'ru'));
    sorted.forEach((r, i) => {
      const datesHtml = r.entries.length
        ? [...r.entries].sort((a,b) => a.day - b.day).map(e => `${formatDate(month.year, month.num, e.day)} <span class="badge ${badgeClass(e.type)}">${e.type}</span>`).join('<br>')
        : '<span style="color: #3a4560">—</span>';
      const total = TOTALS[r.fio] ?? 0;
      html += `<tr><td>${String(i + 1).padStart(2, '0')}</td><td class="td-fio">${r.fio}</td><td class="td-dates">${datesHtml}</td><td class="td-count ${countClass(r.month_total)}">${r.month_total || '—'}</td><td class="td-total ${countClass(total)}">${total || '—'}</td></tr>`;
    });
  }
  html += '</tbody></table></div>';
  return html;
}

function buildSummaryPanel() {
  let html = `<div class="table-container"><table><thead><tr><th>#</th><th>ФИО</th><th style="text-align: left">Всего нарядов</th></tr></thead><tbody>`;
  const sorted = ROSTER.map(fio => [fio, TOTALS[fio] ?? 0]).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ru'));
  sorted.forEach(([fio, total], i) => {
    html += `<tr><td>${String(i + 1).padStart(2, '0')}</td><td class="td-fio">${fio}</td><td class="td-count ${countClass(total)}" style="text-align: left; padding-left: 16px">${total}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function updateFooter(key) {
  if (key === 'ИТОГО') {
    const allTotal = ROSTER.reduce((sum, fio) => sum + (TOTALS[fio] || 0), 0);
    document.getElementById('footer').textContent = `Личный состав: ${ROSTER.length} · Всего нарядов: ${allTotal} · Источник: ${DATA_SOURCE_LABEL}`;
  } else {
    const rows = DATA[key] || [];
    const total = rows.reduce((s, r) => s + r.month_total, 0);
    const status = total === 0 ? '— данные не внесены —' : `${total} нарядов за месяц`;
    document.getElementById('footer').textContent = `${key.replace('_', ' ')} · ${status} · Источник: ${DATA_SOURCE_LABEL}`;
  }
}

    updateFooter('ИТОГО');

  panelsEl.appendChild(summaryPanel);

  MONTHS.forEach((m, i) => {
    const label = m.name + ' ' + m.year;
    const tab = document.createElement('button');
    tab.className = 'tab';
    tab.textContent = label;
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.month-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + i).classList.add('active');
      updateFooter(m.name + '_' + m.year);
    };
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'month-panel';
    panel.id = 'panel-' + i;
    panel.innerHTML = buildMonthPanel(m);
    panelsEl.appendChild(panel);
  });
  updateFooter('ИТОГО');
}
